# fly.toml app configuration file generated for meteorologygo on 2026-04-28T19:45:12Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'meteorologygo'
primary_region = 'gru'

[build]

[deploy]
  strategy = 'immediate'

[env]
  PORT = '8080'

[[mounts]]
  source = 'data'
  destination = '/data'
  initial_size = '1gb'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
